<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="admin-login.css">
</head>
<body>

<div class="login-container">

    <h1>🎌 Anime Store Admin</h1>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script src="admin-login.js"></script>

</body>
</html>
